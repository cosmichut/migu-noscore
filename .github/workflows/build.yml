name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          cd migu-noscore
          zip -r ../migu-noscore.zip . -x "README.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: migu-noscore
          path: migu-noscore.zip
